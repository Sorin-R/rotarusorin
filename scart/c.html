<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .envelope {
            width: 300px;
            height: 200px;
            background-image: url(/img/envelope.svg);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            position: relative;
            perspective: 1000px;
            transition: transform 0.8s, opacity 1s 1s;
            transform-style: preserve-3d;
        }

        .form {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 20px;
            background: #fff;
            box-sizing: border-box;
            transform: rotateX(0deg);
            transform-origin: bottom;
            transition: transform 0.8s, opacity 0.8s;
            opacity: 1;
        }

        .form input,
        .form textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border: none;
            box-sizing: border-box;
        }

        .form input[type="submit"] {
            cursor: pointer;
            background: #333;
            color: #fff;
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 50%;
            background: transparent;
            transform: rotateX(90deg);
            transform-origin: bottom;
            transition: transform 0.8s;
        }

        .flap.top {
            top: 0;
        }

        .flap.bottom {
            bottom: 0;
        }

        .envelope.closed .form {
            transform: rotateX(90deg);
            opacity: 0;
        }

        .envelope.closed .flap {
            transform: rotateX(0deg);
        }

        .envelope.closed {
            transform: translateY(300px);
            opacity: 0;
        }

        .sent {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            text-align: center;
            opacity: 0;
            transition: opacity 2s;
        }

        .envelope.closed~.sent {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="envelope" id="envelope">
        <form id="form" class="form">
            <input type="text" placeholder="Name" required />
            <input type="email" placeholder="Email" required />
            <textarea placeholder="Message" required></textarea>
            <input type="submit" value="Send" />
        </form>
        <div class="flap top"></div>
        <div class="flap bottom"></div>
    </div>
    <div class="sent" id="sent">SENT</div>

    <script>
        // Add an event listener to the form to add the 'closed' class when submitted
        document.getElementById('form').addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('envelope').classList.add('closed');
        });

        // Define a function to reset the form and envelope
        function resetFormAndEnvelope() {
            // Get the form and envelope elements
            const form = document.getElementById('form');
            const envelope = document.getElementById('envelope');

            // Reset the form fields
            form.reset();

            // Reset the envelope
            envelope.classList.remove('closed');
        }

        // Create an Intersection Observer to watch the contact section
        let observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                // If the section is not in view, reset the form and envelope
                if (!entry.isIntersecting) {
                    resetFormAndEnvelope();
                }
            });
        });

        // Observe the contact section
        observer.observe(document.getElementById('contact-section'));
    </script>
</body>

</html>
