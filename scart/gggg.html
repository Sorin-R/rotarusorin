<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Accordion</title>
    <style>
        .accordion .accordion-item {
            border-bottom: 1px solid #ddd;
        }

        .accordion .accordion-link {
            display: block;
            padding: 15px;
            font-size: 20px;
            text-decoration: none;
            color: #444;
            background-color: #f2f2f2;
            transition: background-color 0.3s ease;
        }

        .accordion .accordion-link:hover, .accordion .accordion-link.active {
            background-color: #ddd;
        }

        .accordion .content {
            padding: 0 15px;
            display: none;
            overflow: hidden;
            background-color: #f9f9f9;
        }

        .accordion .content.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="accordion">
    <div class="accordion-item">
        <a href="#" class="accordion-link">Section 1</a>
        <div class="content">
            <p>This is the content of Section 1.</p>
        </div>
    </div>
    <div class="accordion-item">
        <a href="#" class="accordion-link">Section 2</a>
        <div class="content">
            <p>This is the content of Section 2.</p>
        </div>
    </div>
    <div class="accordion-item">
        <a href="#" class="accordion-link">Section 3</a>
        <div class="content">
            <p>This is the content of Section 3.</p>
        </div>
    </div>
    <div class="accordion-item">
        <a href="#" class="accordion-link">Section 4</a>
        <div class="content">
            <p>This is the content of Section 4.</p>
        </div>
    </div>
    <div class="accordion-item">
        <a href="#" class="accordion-link">Section 5</a>
        <div class="content">
            <p>This is the content of Section 5.</p>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.accordion-link').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const content = this.nextElementSibling;
            if(content.style.display === "block") {
                content.style.display = "none";
                this.classList.remove('active');
            } else {
                document.querySelectorAll('.content').forEach(c => c.style.display = "none");
                document.querySelectorAll('.accordion-link').forEach(l => l.classList.remove('active'));
                content.style.display = "block";
                this.classList.add('active');
            }
        });
    });
</script>

</body>
</html>
